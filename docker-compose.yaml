services:
  app:
    build: .
    container_name: backcontainer
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgredb:5432/test1
      - DATABASE_USERNAME=admin
      - DATABASE_PASSWORD=12345
      - SECURITY_JWT_SECRET=aW5jbHVkaW5nam9pbmVkYmxvb2RmZWx0Z2F0aGVyZmlyZXBsYWNlaHVuZ3J5ZXZlcnk=
    depends_on:
      postgredb:
        condition: service_healthy

  postgredb:
    image: postgres:17-alpine
    container_name: dbcontainer
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "test1"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "12345"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
