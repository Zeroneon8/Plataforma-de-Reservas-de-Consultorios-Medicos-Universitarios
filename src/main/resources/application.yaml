spring:
  application:
    name: plataforma-reservas-medicas

  #configuración de la conexión a la base de datos
  #usa variables de entorno definidas en docker-compose o un archivo .env
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}

  #configuración de hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: ${DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false

#configuración de seguridad, el secret se define por variable de entorno (docker-compose o .env)
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    expiration-seconds: 3600

cors:
  allowed-origins: http://localhost:5173